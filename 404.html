<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta name="robots" content="noindex, nofollow">
<title>Page Not Found — Servify</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23e8521a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='20' fill='white'>S</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0d0d0d;--paper:#f5f2eb;--cream:#ede9df;--accent:#e8521a;--muted:#7a7570;--border:#e2ddd5}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--accent);letter-spacing:-0.04em;margin-bottom:48px;display:block;text-decoration:none}
  .error-code{font-family:'Syne',sans-serif;font-size:clamp(80px,20vw,160px);font-weight:800;color:var(--cream);line-height:1;letter-spacing:-0.06em;margin-bottom:8px}
  h1{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;margin-bottom:12px}
  p{color:var(--muted);font-size:1rem;max-width:400px;margin-bottom:32px;line-height:1.6}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.95rem;cursor:pointer;border:none;transition:all 0.2s;text-decoration:none}
  .btn-accent{background:var(--accent);color:white}
  .btn-accent:hover{background:#cc4412;transform:translateY(-2px)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--border);margin-left:12px}
  .btn-ghost:hover{background:var(--cream)}
  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
  <a class="logo" href="index.html">Servify</a>
  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="actions">
    <a class="btn btn-accent" href="index.html">← Back to Home</a>
    <a class="btn btn-ghost" href="dashboard.html">My Dashboard</a>
  </div>
</body>
</html>
