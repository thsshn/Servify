<script>
// ═══════════════════════════════════════════════════════
//  SERVIFY SECURITY MODULE v2.0
//  - AES-256-GCM encryption for sensitive local data
//  - Input sanitization & validation
//  - Rate limiting & brute force protection
//  - Session integrity checks
//  - XSS & injection prevention
// ═══════════════════════════════════════════════════════

// ── AES-256-GCM Encryption (Web Crypto API) ──
const ServifyCrypto = (() => {
  // Derive a per-browser key from a combo of origin + user agent
  // Not a secret key — used to prevent plain-text storage of session hints
  async function _deriveKey() {
    const raw = window.location.origin + navigator.userAgent.slice(0, 40);
    const enc = new TextEncoder().encode(raw);
    const hash = await crypto.subtle.digest('SHA-256', enc);
    return crypto.subtle.importKey('raw', hash, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
  }

  async function encrypt(plaintext) {
    try {
      const key = await _deriveKey();
      const iv  = crypto.getRandomValues(new Uint8Array(12)); // 96-bit IV for GCM
      const enc = new TextEncoder().encode(plaintext);
      const ct  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc);
      // Pack IV + ciphertext into base64
      const combined = new Uint8Array(iv.byteLength + ct.byteLength);
      combined.set(iv, 0);
      combined.set(new Uint8Array(ct), iv.byteLength);
      return btoa(String.fromCharCode(...combined));
    } catch { return null; }
  }

  async function decrypt(b64) {
    try {
      const key  = await _deriveKey();
      const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const iv   = data.slice(0, 12);
      const ct   = data.slice(12);
      const pt   = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(pt);
    } catch { return null; }
  }

  // Encrypted sessionStorage wrapper
  const secureStore = {
    async set(key, value) {
      const enc = await encrypt(JSON.stringify(value));
      if (enc) sessionStorage.setItem('_s_' + key, enc);
    },
    async get(key) {
      const raw = sessionStorage.getItem('_s_' + key);
      if (!raw) return null;
      try { return JSON.parse(await decrypt(raw)); } catch { return null; }
    },
    remove(key) { sessionStorage.removeItem('_s_' + key); }
  };

  return { encrypt, decrypt, secureStore };
})();

// ── Input Hardening ──
const SecureInput = (() => {
  // Strip any HTML/script tags from user input
  function stripTags(str) {
    return String(str || '').replace(/<[^>]*>/g, '').trim();
  }

  // Validate and sanitize all form inputs before DB submission
  function sanitizeObject(obj) {
    const out = {};
    for (const [k, v] of Object.entries(obj)) {
      if (typeof v === 'string') {
        out[k] = stripTags(v).slice(0, 2000); // hard cap at 2000 chars
      } else {
        out[k] = v;
      }
    }
    return out;
  }

  // SQL injection pattern detection (defence in depth — RLS is primary defence)
  function hasSQLInjection(str) {
    const patterns = [/(\'|\"|;|-{2}|\/\*|\*\/|xp_|UNION\s+SELECT|DROP\s+TABLE|INSERT\s+INTO|DELETE\s+FROM|EXEC\s*\()/i];
    return patterns.some(p => p.test(str));
  }

  // Check all string fields in an object for injection attempts
  function isSafe(obj) {
    return !Object.values(obj).some(v => typeof v === 'string' && hasSQLInjection(v));
  }

  return { stripTags, sanitizeObject, hasSQLInjection, isSafe };
})();

// ── Session Integrity ──
const SessionGuard = (() => {
  let _lastActivity = Date.now();
  const IDLE_LIMIT  = 30 * 60 * 1000; // 30 minutes

  function touch() { _lastActivity = Date.now(); }

  function isExpired() { return Date.now() - _lastActivity > IDLE_LIMIT; }

  // Bind activity listeners once
  function init() {
    ['click','keydown','scroll','mousemove','touchstart'].forEach(ev =>
      document.addEventListener(ev, touch, { passive: true })
    );
  }

  return { touch, isExpired, init };
})();

// ── Anti-Enumeration: Constant-time string comparison ──
function safeEqual(a, b) {
  // Prevents timing attacks on string comparison
  if (a.length !== b.length) return false;
  let diff = 0;
  for (let i = 0; i < a.length; i++) diff |= a.charCodeAt(i) ^ b.charCodeAt(i);
  return diff === 0;
}

// ── Output Encoding ──
// Already defined as sanitize() in each page — this is the canonical version
function secureEncode(str) {
  const d = document.createElement('div');
  d.textContent = String(str || '');
  return d.innerHTML;
}

// ── URL Safety ──
function isSafeUrl(url) {
  if (!url) return false;
  try {
    const u = new URL(url);
    return ['https:', 'http:'].includes(u.protocol);
  } catch { return false; }
}

// Prevent open redirect attacks — only allow same-origin redirects
function safeRedirect(url) {
  try {
    const u = new URL(url, window.location.origin);
    if (u.origin !== window.location.origin) {
      console.warn('[Security] Blocked redirect to external origin:', url);
      return;
    }
    window.location.href = u.href;
  } catch { window.location.href = '/'; }
}

// ── Init ──
SessionGuard.init();

function showError(msg) {

  document.getElementById('spinner').style.display    = 'none';

  try {
    // Give Supabase a moment to process the URL hash/params
    await new Promise(r => setTimeout(r, 200));

    if (error) {
      showError(error.message || 'Authentication error. Please try signing in again.');
      return;
    }

    if (!session) {
      // No session — check if there's an error in the URL
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
      const errDesc = params.get('error_description') || hashParams.get('error_description');
