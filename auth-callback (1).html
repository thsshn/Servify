<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signing you in… — Servify</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23e8521a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='20' fill='white'>S</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #faf9f7;
    font-family: system-ui, -apple-system, sans-serif;
    color: #1a1a1a;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid #e8e6e0;
    padding: 40px 36px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  .logo {
    width: 52px;
    height: 52px;
    background: #e8521a;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    font-family: Arial, sans-serif;
  }
  h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 8px; }
  p  { font-size: 0.875rem; color: #888; margin: 0; line-height: 1.5; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #f0ede8;
    border-top-color: #e8521a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 20px auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: #991b1b;
    margin-top: 16px;
    text-align: left;
    line-height: 1.5;
    display: none;
  }
  .btn-home {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 24px;
    background: #e8521a;
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">S</div>
  <h1 id="status-title">Completing sign-in…</h1>
  <p id="status-sub">Please wait while we verify your account.</p>
  <div class="spinner" id="spinner"></div>
  <div class="error-msg" id="error-box"></div>
  <a href="/" class="btn-home" id="home-btn" style="display:none">Go to Homepage</a>
</div>

<script>
const SUPABASE_URL  = 'https://cdxxltgowjlfbhcqjqkr.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkeHhsdGdvd2psZmJoY3FqcWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDU3OTQsImV4cCI6MjA5MjA4MTc5NH0.WCyz_pEqI0a_NHCYyIY_eF6YCj-4PKmQQUTc4i5vWF4';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
});

function showError(msg) {
  document.getElementById('status-title').textContent = 'Sign-in failed';
  document.getElementById('status-sub').textContent   = 'Something went wrong during authentication.';
  document.getElementById('spinner').style.display    = 'none';
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
  document.getElementById('home-btn').style.display = 'inline-block';
}

(async () => {
  try {
    // Give Supabase a moment to process the URL hash/params
    await new Promise(r => setTimeout(r, 200));

    const { data: { session }, error } = await db.auth.getSession();

    if (error) {
      showError(error.message || 'Authentication error. Please try signing in again.');
      return;
    }

    if (!session) {
      // No session — check if there's an error in the URL
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
      const errDesc = params.get('error_description') || hashParams.get('error_description');
      if (errDesc) {
        showError(decodeURIComponent(errDesc));
      } else {
        showError('No session found. The link may have expired — please try signing in again.');
      }
      return;
    }

    // Success — redirect to dashboard
    document.getElementById('status-title').textContent = 'Signed in!';
    document.getElementById('status-sub').textContent   = 'Redirecting you to your dashboard…';
    window.location.replace('/dashboard.html');

  } catch (err) {
    showError('Unexpected error: ' + (err?.message || String(err)));
  }
})();
</script>
</body>
</html>
